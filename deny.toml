# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# rsa 0.9.10: Marvin Attack (timing sidechannel). No fix available.
# Transitive dep via sqlx-mysql — not directly exploitable in our usage.
# Track: https://rustsec.org/advisories/RUSTSEC-2023-0071
ignore = ["RUSTSEC-2023-0071"]

[licenses]
allow = [
    "GPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    # webpki-roots (Mozilla CA certificates) uses this permissive data license
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
