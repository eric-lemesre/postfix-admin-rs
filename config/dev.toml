# postfix-admin-rs — development profile overrides

[server]
workers = 1
port = 8080

[database]
url = "postgresql://postfix_admin:password@localhost:5432/postfix_admin"

[auth]
allow_cleartext = true

[auth.argon2]
memory_cost = 4096                  # Faster hashing for development
time_cost = 1

[password_policy]
min_length = 4

[logging]
level = "debug"
format = "pretty"

[server.tls]
enabled = false
