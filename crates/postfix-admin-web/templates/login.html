{% extends "base.html" %}

{% block title %}Login - PostfixAdmin{% endblock %}

{% block body %}
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900">PostfixAdmin</h2>
            <p class="mt-2 text-center text-sm text-gray-600">Sign in to your admin account</p>
        </div>

        {% if let Some(err) = error %}
        <div class="rounded-md bg-red-50 p-4">
            <p class="text-sm text-red-700">{{ err }}</p>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="-space-y-px rounded-md shadow-sm">
                <div>
                    <label for="username" class="sr-only">Email address</label>
                    <input id="username" name="username" type="email" required
                           class="relative block w-full rounded-t-md border-0 py-1.5 px-3 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-indigo-600 sm:text-sm"
                           placeholder="admin@example.com">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required
                           class="relative block w-full rounded-b-md border-0 py-1.5 px-3 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-indigo-600 sm:text-sm"
                           placeholder="Password">
                </div>
            </div>
            <div>
                <button type="submit"
                        class="group relative flex w-full justify-center rounded-md bg-indigo-600 py-2 px-3 text-sm font-semibold text-white hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
