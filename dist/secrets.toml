# postfix-admin-rs — secrets (mode 0600, owner postfix-admin-rs)
# Place this file at /etc/postfix-admin-rs/secrets.toml
#
# IMPORTANT: This file contains sensitive credentials.
# Ensure restrictive permissions: chmod 0600, chown postfix-admin-rs:postfix-admin-rs

[server]
secret_key = ""                     # Generate with: openssl rand -base64 32

[database]
url = "postgresql://postfix_admin:CHANGE_ME@localhost:5432/postfix_admin"

[mail]
smtp_username = ""
smtp_password = ""

[encryption]
master_key = ""                     # Generate with: openssl rand -base64 32
